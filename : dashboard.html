<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>میرا خاندان - ڈیش بورڈ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { background: #f8f9fa; font-family: 'Tahoma', sans-serif; }
        .main-content { max-width: 800px; margin: 50px auto; padding: 20px; }
        .record-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container main-content">
    <div class="record-card">
        <h2 class="text-center mb-4 text-primary">خاندان کا ریکارڈ درج کریں</h2>
        
        <div class="mb-3">
            <label class="form-label">فرد کا نام</label>
            <input type="text" id="memberName" class="form-control" placeholder="نام لکھیں">
        </div>
        
        <div class="mb-3">
            <label class="form-label">رشتہ</label>
            <select id="memberRelation" class="form-control">
                <option value="">منتخب کریں</option>
                <option value="بھائی">بھائی</option>
                <option value="بیٹا">بیٹا</option>
                <option value="بیٹی">بیٹی</option>
                <option value="اہلیہ">اہلیہ</option>
            </select>
        </div>

        <button onclick="alert('ڈیٹا بیس ابھی کنیکٹ ہونا باقی ہے!')" class="btn btn-success w-100">محفوظ کریں</button>
    </div>
</div>

</body>
</html>
