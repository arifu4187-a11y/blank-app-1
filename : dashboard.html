<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڈیش بورڈ - فیملی ریکارڈ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
            <h2 class="text-center mb-4">فرد کا ڈیٹا محفوظ کریں</h2>
            <div class="mb-3">
                <input type="text" id="memberName" class="form-control" placeholder="نام لکھیں">
            </div>
            <div class="mb-3">
                <select id="memberRelation" class="form-control">
                    <option value="">رشتہ منتخب کریں</option>
                    <option value="بھائی">بھائی</option>
                    <option value="بیٹا">بیٹا</option>
                    <option value="بیٹی">بیٹی</option>
                </select>
            </div>
            <button onclick="saveData()" class="btn btn-success w-100">ڈیٹا بیس میں بھیجیں</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCEFszHsWHUW4EzVS_ZobYpK_QSVF_zfcE",
            authDomain: "family-portal-8d643.firebaseapp.com",
            projectId: "family-portal-8d643",
            storageBucket: "family-portal-8d643.firebasestorage.app",
            messagingSenderId: "653852840902",
            appId: "1:653852840902:web:39aadd95f881ea07af18c7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function saveData() {
            const name = document.getElementById('memberName').value;
            const rel = document.getElementById('memberRelation').value;
            db.collection("members").add({
                fard_ka_naam: name,
                rishta: rel,
                time: new Date()
            }).then(() => { alert("ڈیٹا محفوظ ہو گیا!"); })
              .catch((e) => { alert("خرابی: " + e.message); });
        }
    </script>
</body>
</html>
