<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فیملی پورٹل - رجسٹریشن</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { background: #f4f7f6; font-family: 'Tahoma', sans-serif; padding-top: 50px; }
        .box { max-width: 450px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="box shadow border">
    <h2 class="text-center mb-4">فیملی پورٹل اکاؤنٹ</h2>
    <div class="mb-3">
        <label>ای میل</label>
        <input type="email" id="email" class="form-control" placeholder="ای میل لکھیں">
    </div>
    <div class="mb-3">
        <label>پاس ورڈ</label>
        <input type="password" id="password" class="form-control" placeholder="پاس ورڈ لکھیں">
    </div>
    <button onclick="alert('ابھی ہم فائر بیس جوڑیں گے!')" class="btn btn-primary w-100">رجسٹر کریں</button>
</div>

</body>
</html>
